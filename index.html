<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кристина.AI | Выбор услуги</title>
    <!-- Официальный скрипт Telegram Web Apps -->
    <script src="https://telegram.org"></script>
    <style>
        :root {
            --bg-color: #0d0e12;
            --border-color: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: #8e929b;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            min-height: 92vh;
            justify-content: space-between;
            overflow-x: hidden;
        }
        .header { text-align: center; padding: 10px 0 20px 0; }
        .header h1 {
            font-size: 22px;
            font-weight: 700;
            margin: 0;
            background: linear-gradient(135deg, #fff 0%, #8e929b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p { font-size: 13px; color: var(--text-muted); margin: 4px 0 0 0; }
        .chat-container { width: 100%; display: flex; flex-direction: column; flex-grow: 1; margin-bottom: 20px; }
        .message {
            padding: 14px 18px;
            border-radius: 20px;
            max-width: 85%;
            line-height: 1.45;
            font-size: 15px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 4px;
        }
        .footer-action { width: 100%; padding-bottom: 10px; display: flex; flex-direction: column; gap: 10px; }
        .btn {
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            text-align: left;
            line-height: 1.3;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }
        .btn span { display: block; font-size: 11px; font-weight: 400; color: #666; margin-top: 4px; }
        .btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

<div class="header">
    <h1>КРИСТИНА.AI</h1>
    <p>Архитектура автоматизации инфобизнеса</p>
</div>

<div class="chat-container">
    <div class="message">
        🤖 Рада видеть вас в КРИСТИНА.AI! Я Lina - AI менеджер для записи клиентов к Кристине на консультацию или диагностику.<br><br>Выберите, что вам нужно в данный момент?
    </div>
</div>

<div class="footer-action">
    <button class="btn" onclick="sendToBot('diag')">
        <b>ДИАГНОСТИКА (3 000 ₽)</b>
        <span>Узнать, где моя текущая воронка тайно сливает клиентов.</span>
    </button>
    <button class="btn" onclick="sendToBot('razbor')">
        <b>ПЕРСОНАЛЬНЫЙ РАЗБОР ПРОЕКТА (2 500 ₽)</b>
        <span>По косточкам разбираем ваше позиционирование, продукт и психологию вашего клиента.</span>
    </button>
    <button class="btn" onclick="sendToBot('consult')">
        <b>ПЕРСОНАЛЬНЫЙ КОНСУЛЬТАЦИЯ (500 ₽)</b>
        <span>В течение 20 минут разбираюсь, какая услуга вам может быть полезна именно сейчас.</span>
    </button>
</div>

<script>
    var tg = window.Telegram?.WebApp;
    if (tg) { try { tg.expand(); } catch (e) {} }

    function sendToBot(command) {
        try {
            if (tg) {
                // Прямой нативный вызов команды — 100% закроет шторку и отправит импульс в чат!
                tg.openTelegramLink("https://t.me" + command);
                tg.close();
            }
        } catch (e) {
            if (tg) tg.close();
        }
    }
</script>
</body>
</html>
